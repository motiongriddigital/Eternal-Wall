# 1. The name of your robot assistant
name: Code Quality Check

# 2. The Trigger: When should this run?
on:
  pull_request:
    branches: [ "main" ]

# 3. The Jobs: What should the robot do?
jobs:
  test-and-build:
    # Use a fresh Linux machine
    runs-on: ubuntu-latest

    steps:
      # Step A: Copy your code from the repo onto the remote machine
      - name: Checkout code
        uses: actions/checkout@v4

      # Step B: Install the language (e.g., Node.js)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # Step C: Install dependencies
      - name: Install dependencies
        run: npm install

      # Step D: Run the Linting test
      - name: Run Lint
        run: npm run lint

      # Step E: Run the Build test
      - name: Run Build
        run: npm run build